# nginx.conf — PlagiarismIQ production reverse proxy
#
# Traffic flow:
#   Client → nginx:80 → static files (frontend/)
#                     → /api/* → gunicorn:8000 (Flask)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Upstream Flask/gunicorn app
    upstream flask_app {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;             # catch-all — replace with your domain

        # Max upload size (for file analysis)
        client_max_body_size 10M;

        # ── Serve static frontend files ──────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Proxy /static/ assets to Flask ───────────────────────────
        location /static/ {
            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # ── Proxy API requests to gunicorn ───────────────────────────
        location /api/ {
            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Security headers ─────────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection      "1; mode=block" always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }
}
